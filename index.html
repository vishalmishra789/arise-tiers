<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arise Network | Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* [YOUR EXISTING CSS GOES HERE - KEEP ALL THE STYLES FROM BEFORE] */
        :root { --bg: #050505; --panel: #0d0e12; --border: #1f2026; --gold: #ffb400; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        .container { padding: 100px 8%; }
        .page { display: none; } .page.active { display: block; }
        .rank-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .player-row { background: var(--panel); border: 1px solid var(--border); }
        .player-row td { padding: 15px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .tier-pill { display: inline-flex; align-items: center; gap: 5px; background: #000; padding: 5px 10px; border-radius: 5px; font-size: 11px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="rankings" class="page active">
        <h1>LEADER<span style="color:var(--gold)">BOARD</span></h1>
        <table class="rank-table">
            <thead>
                <tr style="text-align:left; color:#929292; font-size:12px;">
                    <th>RANK</th><th>PLAYER</th><th>POINTS</th><th>REGION</th><th style="text-align:right">TIERS</th>
                </tr>
            </thead>
            <tbody id="pBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 1. INITIALIZE SUPABASE
    const supabaseUrl = 'YOUR_SUPABASE_URL';
    const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
    const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

    async function fetchLeaderboard() {
        // Fetch players sorted by points (Highest first)
        const { data, error } = await supabase
            .from('players')
            .select('*')
            .order('points', { ascending: false });

        if (error) return console.error(error);
        
        const body = document.getElementById('pBody');
        body.innerHTML = data.map((p, i) => `
            <tr class="player-row">
                <td>#${i + 1}</td>
                <td><b>${p.ign}</b></td>
                <td style="color:var(--gold)">${p.points}</td>
                <td>${p.region}</td>
                <td style="text-align:right">
                    ${Object.entries(p.tiers).map(([kit, tier]) => `
                        <div class="tier-pill"><b>${kit}:</b> ${tier}</div>
                    `).join('')}
                </td>
            </tr>
        `).join('');
    }

    window.onload = fetchLeaderboard;
</script>
</body>
</html>
