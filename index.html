<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arise Network | Official</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        :root {
            --bg: #050505; --panel: #0d0e12; --border: #1f2026; --gold: #ffb400;
            --gold-glow: rgba(255, 180, 0, 0.2); --text-dim: #929292; --discord: #5865F2;
            --online: #43b581; --idle: #faa61a; --dnd: #f04747; --offline: #747f8d;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- NAVIGATION --- */
        .header-nav {
            position: fixed; top: 0; width: 100%; height: 90px;
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .nav-container { display: flex; align-items: center; gap: 30px; }
        .nav-item {
            color: var(--text-dim); text-decoration: none;
            font-weight: 800; font-size: 12px; cursor: pointer;
            transition: 0.3s; padding: 12px 18px; border-radius: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-item:hover, .nav-item.active { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-item.active { color: var(--gold); box-shadow: inset 0 -2px 0 var(--gold); border-radius: 0; }

        .container { padding: 130px 8% 60px; max-width: 1500px; margin: 0 auto; }
        .page { display: none; animation: fadeIn 0.4s ease forwards; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HOME & NEWS --- */
        .home-hero { text-align: center; padding: 40px 0 40px; }
        .home-hero h1 { font-size: 85px; font-weight: 900; margin: 0; letter-spacing: -4px; line-height: 0.9; }
        .news-section { margin-top: 50px; text-align: left; }
        .news-card { background: #111218; border-left: 4px solid var(--gold); padding: 20px; border-radius: 10px; margin-bottom: 15px; }

        /* --- RANKINGS --- */
        .gm-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin: 30px 0; scrollbar-width: none; }
        .gm-btn {
            background: var(--panel); border: 1px solid var(--border); color: var(--text-dim); padding: 12px 20px; 
            border-radius: 12px; font-weight: 800; font-size: 11px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s;
            white-space: nowrap;
        }
        .gm-btn.active { background: #1c1d23; border-color: var(--gold); color: #fff; }
        .gm-btn img { width: 20px; height: 20px; border-radius: 4px; }
        
        .rank-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .player-row { background: var(--panel); }
        .player-row td { padding: 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .player-row td:first-child { border-left: 1px solid var(--border); border-top-left-radius: 15px; border-bottom-left-radius: 15px; text-align: center; }
        .player-row td:last-child { border-right: 1px solid var(--border); border-top-right-radius: 15px; border-bottom-right-radius: 15px; }
        
        .rank-badge { padding: 6px 12px; border-radius: 8px; font-weight: 900; }
        .gold-rank { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold-glow); }
        .silver-rank { background: #d1d1d1; color: #000; }
        .bronze-rank { background: #cd7f32; color: #fff; }

        .tier-pill { display: inline-flex; align-items: center; gap: 8px; background: #000; padding: 8px 14px; border-radius: 10px; border: 1px solid #222; font-size: 12px; font-weight: 900; color: var(--gold); margin: 2px; }
        .tier-pill img { width: 18px; height: 18px; border-radius: 3px; }

        /* --- TESTERS --- */
        .tester-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .tester-card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 20px; position: relative; transition: 0.3s; }
        .owner-superior { grid-column: 1 / -1; background: linear-gradient(145deg, #0d0e12, #1a1b23); border: 2px solid var(--gold); }
        .status-badge { position: absolute; top: 20px; right: 20px; font-size: 9px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .tester-avatar { width: 60px; height: 60px; border-radius: 15px; border: 2px solid #1f2026; }

        .card { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 20px; margin-bottom: 20px; }
        .kit-img { width: 100%; border-radius: 15px; margin-top: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<header class="header-nav">
    <div class="nav-container">
        <div class="nav-item active" onclick="showPage('home')">Home</div>
        <div class="nav-item" onclick="showPage('rankings')">Rankings</div>
        <div class="nav-item" onclick="showPage('testers')">Testers</div>
        <div class="nav-item" onclick="showPage('guide')">Guide</div>
        <div class="nav-item" onclick="showPage('rules')">Rules</div>
    </div>
</header>

<div class="container">

    <div id="home" class="page active">
        <div class="home-hero">
            <h1>ARISE <span style="color:var(--gold)">NETWORK</span></h1>
            <p>The elite standard for Minecraft combat analytics in Asia.</p>
        </div>
        <div class="news-section">
            <h2 style="color:var(--gold); font-size: 14px; letter-spacing: 2px; text-transform: uppercase;">Latest Announcements</h2>
            <div id="news-feed">Loading updates...</div>
        </div>
    </div>

    <div id="rankings" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>LEADER<span style="color:var(--gold)">BOARD</span></h1>
            <input type="text" id="pSearch" style="background:var(--panel); border:1px solid var(--border); color:#fff; padding:12px; border-radius:10px; width:250px;" placeholder="Search player..." onkeyup="renderPlayers()">
        </div>
        <div class="gm-scroll">
            <div class="gm-btn active" onclick="setGM('all')">OVERALL</div>
            <div class="gm-btn" onclick="setGM('Crystal')"><img src="https://i.ibb.co/Qj6Rzzjn/crystal.jpg"> CRYSTAL</div>
            <div class="gm-btn" onclick="setGM('Mace')"><img src="https://i.ibb.co/DHYd2KcH/mace.jpg"> MACE</div>
            <div class="gm-btn" onclick="setGM('Sword')"><img src="https://i.ibb.co/4q5XZD1/sword.jpg"> SWORD</div>
            <div class="gm-btn" onclick="setGM('Nethpot')"><img src="https://i.ibb.co/QRjqZ1d/nethpot.jpg"> NETHPOT</div>
            <div class="gm-btn" onclick="setGM('Axe')"><img src="https://i.ibb.co/Vc73Q3sV/axe.jpg"> AXE</div>
            <div class="gm-btn" onclick="setGM('SMP')"><img src="https://i.ibb.co/zhMLjTFK/smp.jpg"> SMP</div>
            <div class="gm-btn" onclick="setGM('Potion')"><img src="https://i.ibb.co/TqvdKKCg/pot.jpg"> POTION</div>
            <div class="gm-btn" onclick="setGM('UHC')"><img src="https://i.ibb.co/7tWt3CvQ/uhc.jpg"> UHC</div>
        </div>
        <table class="rank-table">
            <thead><tr style="text-align:left; font-size:11px; color:var(--text-dim);"><th style="padding-left:20px;"># RANK</th><th>PLAYER</th><th>POINTS</th><th>REGION</th><th style="text-align:right; padding-right:20px;">TIERS</th></tr></thead>
            <tbody id="pBody"></tbody>
        </table>
    </div>

    <div id="testers" class="page">
        <h1 style="margin-bottom:40px;">STAFF <span style="color:var(--gold)">ROSTER</span></h1>
        <div class="tester-grid" id="tester-list">Fetching staff data...</div>
    </div>

    <div id="guide" class="page"><div class="tester-grid" id="guide-list"></div></div>
    <div id="rules" class="page"><div id="rules-list" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;"></div></div>

</div>

<script>
    const SB_URL = "https://zsdtlcyzhcfgcwqucdjd.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZHRsY3l6aGNmZ2N3cXVjZGpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDY2MDYsImV4cCI6MjA5MDEyMjYwNn0.IgjMXn3NbVw5nt8CvrJksD4NTEr26nLGwdytUgWFLe0";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const iconMap = { Crystal: "https://i.ibb.co/Qj6Rzzjn/crystal.jpg", Mace: "https://i.ibb.co/DHYd2KcH/mace.jpg", Sword: "https://i.ibb.co/4q5XZD1/sword.jpg", Nethpot: "https://i.ibb.co/QRjqZ1d/nethpot.jpg", Axe: "https://i.ibb.co/Vc73Q3sV/axe.jpg", SMP: "https://i.ibb.co/zhMLjTFK/smp.jpg", Potion: "https://i.ibb.co/TqvdKKCg/pot.jpg", UHC: "https://i.ibb.co/7tWt3CvQ/uhc.jpg" };
    const rulesData = ["1. Tier Testing Only Counts Here", "2. Be Honest", "3. No Cheating", "4. Participation Required", "5. Respect the Testers", "6. Clips Are for Review Only", "7. Timeliness Matters", "8. Testing Environment", "9. Skill Over Style", "10. Communication", "11. Privacy & Security", "12. Re-Tier Requests", "13. Fair Competition", "14. Feedback Welcome", "15. Consequences Are Real", "16. Your Skill = Your Tier"];
    const guides = [{ t: "Netherite Potion", img: "https://i.ibb.co/j0R7xgB/Ry-HWR7F.webp", d: "FT4 testing. LT3 score: 3-4." }, { t: "Sword PvP", img: "https://i.ibb.co/4nPj7q1J/w-Txkbpa.webp", d: "FT10 testing. Diamond Sword." }, { t: "Axe PvP", img: "https://i.ibb.co/z33C5wC/image-1.webp", d: "FT10 testing. Unenchanted." }, { t: "SMP Kit", img: "https://i.ibb.co/FbrQxvCd/L6b5d4m.webp", d: "FT3 testing. Netherite P4." }, { t: "Crystal PvP", img: "https://i.ibb.co/cctTKK0N/Gl2LJt-Y.webp", d: "14 Totems. No Gapples." }, { t: "Mace PvP", img: "https://i.ibb.co/ymvkqBHm/dwawadadwwadawd.webp", d: "FT3 testing. Breach IV." }, { t: "UHC", img: "https://i.ibb.co/sJzv07gk/AT0i-JN9.webp", d: "FT10. P3 Diamond." }, { t: "Potion PvP", img: "https://i.ibb.co/F4t8VRLF/3Y1c-Sjq.webp", d: "FT5/10. P4 Armor." }];

    let currentGM = 'all';

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        const navItem = Array.from(document.querySelectorAll('.nav-item')).find(item => item.innerText.toLowerCase() === p);
        if(navItem) navItem.classList.add('active');
        if(p === 'home') loadNews();
        if(p === 'rankings') renderPlayers();
        if(p === 'testers') loadTesters();
    }

    function setGM(gm) {
        currentGM = gm;
        document.querySelectorAll('.gm-btn').forEach(b => b.classList.remove('active'));
        const clickedBtn = Array.from(document.querySelectorAll('.gm-btn')).find(btn => btn.getAttribute('onclick').includes(`'${gm}'`));
        if(clickedBtn) clickedBtn.classList.add('active');
        renderPlayers();
    }

    async function loadNews() {
        const { data } = await supabaseClient.from('announcements').select('*').order('created_at', { ascending: false }).limit(3);
        const feed = document.getElementById('news-feed');
        if(!data || data.length === 0) { feed.innerHTML = "No recent announcements."; return; }
        feed.innerHTML = data.map(n => `
            <div class="news-card">
                <h3 style="margin:0 0 5px; font-size:18px;">${n.title}</h3>
                <p style="margin:0; color:var(--text-dim); font-size:14px;">${n.body}</p>
            </div>
        `).join('');
    }

    async function renderPlayers() {
        const query = document.getElementById('pSearch').value.toLowerCase();
        const body = document.getElementById('pBody');
        let { data: players } = await supabaseClient.from('players').select('*').order('points', { ascending: false });
        if (!players) return;

        let filtered = players.filter(p => p.ign.toLowerCase().includes(query));
        if (currentGM !== 'all') filtered = filtered.filter(p => (p.tiers || {})[currentGM]);

        body.innerHTML = filtered.map((p, i) => {
            let rankClass = i === 0 ? 'gold-rank' : i === 1 ? 'silver-rank' : i === 2 ? 'bronze-rank' : '';
            return `
            <tr class="player-row">
                <td style="padding-left:20px;"><span class="rank-badge ${rankClass}">${i + 1}</span></td>
                <td><div style="display:flex;align-items:center;gap:12px;"><img src="https://mc-heads.net/avatar/${p.ign}/40" style="border-radius:10px;"><b>${p.ign}</b></div></td>
                <td><b style="color:var(--gold); font-size:16px;">${p.points}</b></td>
                <td><span style="background:var(--discord);padding:4px 8px;border-radius:6px;font-size:10px;font-weight:800;">${p.region}</span></td>
                <td style="text-align:right; padding-right:20px;">
                    ${Object.entries(p.tiers || {}).filter(([m]) => currentGM === 'all' || m === currentGM)
                    .map(([k,v]) => `<div class="tier-pill"><img src="${iconMap[k]}">${v}</div>`).join('')}
                </td>
            </tr>`;
        }).join('');
    }

    async function loadTesters() {
        const grid = document.getElementById('tester-list');
        const { data: staffList } = await supabaseClient.from('staff').select('*');
        if(!staffList) return;
        grid.innerHTML = "";

        for (const staff of staffList) {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/${staff.discord_id}`);
                const data = await res.json();
                if (!data.success) continue;
                const user = data.data;
                const status = user.discord_status || 'offline';
                grid.innerHTML += `
                    <div class="tester-card ${staff.role === 'Owner' ? 'owner-superior' : ''}">
                        <div class="status-badge"><div class="status-dot" style="background:var(--${status}); box-shadow:0 0 8px var(--${status})"></div> ${status}</div>
                        <div style="display:flex; align-items:center; gap:20px;">
                            <img src="https://cdn.discordapp.com/avatars/${staff.discord_id}/${user.discord_user.avatar}.png" class="tester-avatar" onerror="this.src='https://mc-heads.net/avatar/MHF_Question/60'">
                            <div>
                                <div style="color:var(--gold); font-size:10px; font-weight:900; text-transform:uppercase;">${staff.role}</div>
                                <div style="font-size:18px; font-weight:800;">${user.discord_user.global_name || user.discord_user.username}</div>
                            </div>
                        </div>
                    </div>`;
            } catch (e) {}
        }
    }

    window.onload = () => {
        loadNews();
        document.getElementById('rules-list').innerHTML = rulesData.map(r => `<div class="card" style="padding:15px; margin:0;"><div style="border-left:3px solid var(--gold);padding-left:10px;"><b>${r}</b></div></div>`).join('');
        document.getElementById('guide-list').innerHTML = guides.map(g => `<div class="card"><h2>${g.t}</h2><p style="color:var(--text-dim); font-size:14px;">${g.d}</p><img src="${g.img}" class="kit-img"></div>`).join('');
    };
</script>
</body>
</html>
