<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arise Tiers | Official</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --bg: #0b0c10; --panel: #16171d; --border: #2a2b33; --gold: #ffb400; --discord: #5865F2; --text-dim: #888; }
        
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; min-height: 100vh; overflow-x: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 260px; height: 100vh; background: #000; padding: 40px 20px; border-right: 1px solid var(--border); position: fixed; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        .sidebar-title { font-weight: 900; font-size: 24px; color: var(--gold); letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
        .discord-btn { width: 90%; background: var(--discord); color: #fff; text-decoration: none; padding: 15px; border-radius: 12px; text-align: center; font-weight: 800; font-size: 14px; transition: 0.3s; }
        .discord-btn:hover { background: #4752c4; transform: translateY(-3px); }

        /* MAIN CONTENT */
        .content { margin-left: 280px; padding: 40px; width: calc(100% - 320px); max-width: 1200px; }
        
        /* SEARCH & TABS */
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; }
        .search-container { flex-grow: 1; position: relative; }
        .search-bar { width: 100%; background: var(--panel); border: 1px solid var(--border); padding: 15px 20px; border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        .search-bar:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(255,180,0,0.1); }

        .tabs { display: flex; gap: 10px; flex-wrap: wrap; background: var(--panel); padding: 12px; border-radius: 15px; border: 1px solid var(--border); }
        .tab-btn { background: #0a0a0c; border: 1px solid #222; padding: 8px; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; width: 70px; transition: 0.2s; }
        .tab-btn img { width: 30px; height: 30px; border-radius: 4px; margin-bottom: 4px; filter: grayscale(1); }
        .tab-btn span { font-size: 9px; font-weight: 800; color: #555; text-transform: uppercase; }
        .tab-btn.active { border-color: var(--gold); background: #1a1b23; }
        .tab-btn.active img { filter: grayscale(0); }
        .tab-btn.active span { color: var(--gold); }

        /* TABLE */
        .table-wrapper { background: var(--panel); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        .leaderboard { width: 100%; border-collapse: collapse; }
        .leaderboard th { background: #1c1d25; padding: 20px; text-align: left; color: #444; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .player-row { border-bottom: 1px solid #1f2029; transition: 0.3s; cursor: pointer; opacity: 0; transform: translateX(-10px); }
        .player-row:hover { background: rgba(255,255,255,0.03); transform: scale(1.005); }
        
        .sticker-list { display: flex; gap: 6px; }
        .sticker { width: 40px; height: 40px; background: #000; border-radius: 50%; border: 2px solid #333; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .sticker img { width: 100%; height: 100%; object-fit: cover; }
        .sticker span { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: var(--gold); font-size: 8px; text-align: center; font-weight: 900; }

        .points-pill { color: var(--gold); font-weight: 900; background: rgba(255,180,0,0.1); padding: 8px 16px; border-radius: 10px; border: 1px solid rgba(255,180,0,0.2); }
        .ign-text { font-weight: 800; font-size: 16px; }
        .role-text { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }

        /* MODAL / PLAYER PAGE */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1b23; border: 1px solid var(--border); width: 500px; border-radius: 24px; position: relative; padding: 30px; animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-close { position: absolute; top: 20px; right: 20px; cursor: pointer; color: #555; font-size: 24px; }
        .modal-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .modal-avatar { width: 80px; height: 80px; border-radius: 15px; border: 2px solid var(--border); }
        .modal-ign { font-size: 28px; font-weight: 900; }
        .modal-role { color: var(--gold); font-size: 14px; text-transform: uppercase; font-weight: 800; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #111; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #222; }
        .stat-label { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-weight: 900; font-size: 18px; }

        .tier-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .tier-item { background: #0f0f15; padding: 10px; border-radius: 12px; display: flex; align-items: center; gap: 10px; border: 1px solid #1f2029; }
        .tier-item img { width: 25px; height: 25px; border-radius: 4px; }
        .tier-info div:first-child { font-size: 10px; color: #555; font-weight: 800; }
        .tier-info div:last-child { font-size: 12px; font-weight: 900; color: var(--gold); }

        @keyframes fadeInRow { to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-title">ARISE TIERS</div>
    <a href="https://discord.gg/msDP8m7UBP" target="_blank" class="discord-btn">JOIN DISCORD</a>
</aside>

<main class="content">
    <div class="header-controls">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search for player username..." oninput="render()">
        </div>
        <div class="tabs" id="tabContainer">
            <div class="tab-btn active" onclick="switchTab('overall')"><img src="https://i.ibb.co/YThnm0DD/overall.jpg"><span>Overall</span></div>
            <div class="tab-btn" onclick="switchTab('sword')"><img src="https://i.ibb.co/4q5XZD1/sword.jpg"><span>Sword</span></div>
            <div class="tab-btn" onclick="switchTab('mace')"><img src="https://i.ibb.co/DHYd2KcH/mace.jpg"><span>Mace</span></div>
            <div class="tab-btn" onclick="switchTab('axe')"><img src="https://i.ibb.co/Vc73Q3sV/axe.jpg"><span>Axe</span></div>
            <div class="tab-btn" onclick="switchTab('nethpot')"><img src="https://i.ibb.co/QRjqZ1d/nethpot.jpg"><span>Nethpot</span></div>
            <div class="tab-btn" onclick="switchTab('crystal')"><img src="https://i.ibb.co/Qj6Rzzjn/crystal.jpg"><span>Crystal</span></div>
        </div>
    </div>

    <div class="table-wrapper">
        <table class="leaderboard">
            <thead>
                <tr><th style="padding-left: 25px;">#</th><th>Player Profile</th><th>Region</th><th>Tiers</th><th style="text-align: right; padding-right: 25px;">Total Points</th></tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeModal(force=true)">&times;</span>
        <div id="modalData"></div>
    </div>
</div>

<script>
    const icons = {
        overall: "https://i.ibb.co/YThnm0DD/overall.jpg", sword: "https://i.ibb.co/4q5XZD1/sword.jpg", mace: "https://i.ibb.co/DHYd2KcH/mace.jpg",
        axe: "https://i.ibb.co/Vc73Q3sV/axe.jpg", nethpot: "https://i.ibb.co/QRjqZ1d/nethpot.jpg", crystal: "https://i.ibb.co/Qj6Rzzjn/crystal.jpg"
    };
    const pointsMap = { "HT1": 25, "LT1": 20, "HT2": 16, "LT2": 13, "HT3": 10, "LT3": 6, "HT4": 4, "LT4": 2, "HT5": 1, "LT5": 1 };

    const players = [
        { ign: "Legend_008", region: "AS", role: "OWNER", tiers: { sword: "HT4", mace: "LT3", crystal: "HT5" } },
        { ign: "Captain_levi", region: "AS", role: "TESTER", tiers: { axe: "HT4" } },
        { ign: "Zenkai_Slice", region: "AS", role: "FIGHTER", tiers: { mace: "HT4" } },
        { ign: "Elden_Boss", region: "AS", role: "FIGHTER", tiers: { nethpot: "LT4", mace: "LT4", crystal: "HT5" } },
        { ign: "Viaan58996", region: "AS", role: "FIGHTER", tiers: { crystal: "HT5", mace: "LT4" } },
        { ign: "okfiaiaa", region: "AS", role: "FIGHTER", tiers: { crystal: "LT4" } },
        { ign: "ThunderSlayer_", region: "AS", role: "FIGHTER", tiers: { sword: "HT5" } },
        { ign: "Richiplayz69_", region: "AS", role: "FIGHTER", tiers: { nethpot: "LT4" } },
        { ign: "fr.adarsh", region: "AS", role: "FIGHTER", tiers: { sword: "HT5" } },
        { ign: "exe.error404__", region: "AS", role: "FIGHTER", tiers: { axe: "HT5" } },
        { ign: "HarshalGamer272", region: "AS", role: "FIGHTER", tiers: { mace: "HT5" } },
        { ign: "Sora24052", region: "AS", role: "FIGHTER", tiers: { mace: "LT5" } },
        { ign: "Kinetic18z", region: "AS", role: "FIGHTER", tiers: { mace: "HT5" } },
        { ign: "AdarshOp7182", region: "AS/AU", role: "FIGHTER", tiers: { mace: "LT5" } }
    ];

    let currentMode = 'overall';

    function render() {
        const body = document.getElementById('leaderboardBody');
        const search = document.getElementById('searchInput').value.toLowerCase();
        body.innerHTML = "";
        
        let list = players.map(p => {
            let score = 0;
            if (currentMode === 'overall') { Object.values(p.tiers).forEach(t => score += (pointsMap[t.toUpperCase()] || 0)); }
            else { score = pointsMap[p.tiers[currentMode]?.toUpperCase()] || 0; }
            return { ...p, score };
        })
        .filter(p => (currentMode === 'overall' || p.tiers[currentMode]) && p.ign.toLowerCase().includes(search))
        .sort((a, b) => b.score - a.score);

        list.forEach((p, i) => {
            const row = document.createElement('tr');
            row.className = `player-row`;
            row.style.animation = `fadeInRow 0.4s ease forwards ${i * 0.05}s`;
            row.onclick = () => openProfile(p, i + 1);
            
            const stickersHtml = currentMode === 'overall' 
                ? Object.entries(p.tiers).map(([m, t]) => `<div class="sticker"><img src="${icons[m]}"><span>${t}</span></div>`).join('')
                : `<div class="sticker"><img src="${icons[currentMode]}"><span>${p.tiers[currentMode]}</span></div>`;

            row.innerHTML = `<td style="padding-left:25px; font-weight:900; color:#444;">#${i + 1}</td><td style="display:flex; align-items:center; gap:12px; padding:15px;"><img src="https://mc-heads.net/avatar/${p.ign}/38" style="border-radius:6px;"><div><div class="ign-text">${p.ign}</div><div class="role-text">${p.role}</div></div></td><td style="color:#ff4d4d; font-weight:800; font-size:12px;">${p.region}</td><td><div class="sticker-list">${stickersHtml}</div></td><td style="text-align: right; padding-right: 25px;"><span class="points-pill">${p.score} PTS</span></td>`;
            body.appendChild(row);
        });
    }

    function openProfile(p, rank) {
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalData');
        
        const tierGrid = Object.entries(p.tiers).map(([mode, tier]) => `
            <div class="tier-item">
                <img src="${icons[mode]}">
                <div class="tier-info"><div>${mode.toUpperCase()}</div><div>${tier}</div></div>
            </div>
        `).join('');

        content.innerHTML = `
            <div class="modal-header">
                <img src="https://mc-heads.net/avatar/${p.ign}/80" class="modal-avatar">
                <div><div class="modal-ign">${p.ign}</div><div class="modal-role">${p.role}</div></div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">Rank</div><div class="stat-value">#${rank}</div></div>
                <div class="stat-card"><div class="stat-label">Total Points</div><div class="stat-value" style="color:var(--gold)">${p.score}</div></div>
                <div class="stat-card"><div class="stat-label">Region</div><div class="stat-value">${p.region}</div></div>
            </div>
            <div style="font-size:12px; font-weight:800; color:#555; text-transform:uppercase; margin-bottom:15px;">Game Mode Tiers</div>
            <div class="tier-grid">${tierGrid}</div>
        `;
        overlay.style.display = 'flex';
    }

    function closeModal(e, force = false) { if(force || e.target.id === 'modalOverlay') document.getElementById('modalOverlay').style.display = 'none'; }

    function switchTab(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab-btn').forEach(b => {
            const txt = b.querySelector('span').innerText.toLowerCase();
            b.classList.toggle('active', txt === mode.toLowerCase());
        });
        render();
    }
    window.onload = render;
</script>
</body>
</html>
