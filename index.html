<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arise Tiers | Official Leaderboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #0b0c10;
            --panel: #16171d;
            --border: #2a2b33;
            --gold: #ffb400;
            --discord: #5865F2;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SIDEBAR */
        .sidebar { 
            width: 280px; height: 100vh; background: #000; padding: 25px; 
            border-right: 1px solid var(--border); position: fixed; 
            display: flex; flex-direction: column; align-items: center; z-index: 100;
        }
        .sidebar-logo { 
            width: 100%; max-width: 220px; margin-bottom: 25px; border-radius: 12px; 
            animation: fadeInDown 0.8s ease;
        }
        .discord-btn { 
            width: 100%; background: var(--discord); color: #fff; text-decoration: none; 
            padding: 14px; border-radius: 10px; text-align: center; font-weight: 800; 
            font-size: 14px; letter-spacing: 1px; transition: var(--transition);
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.2);
        }
        .discord-btn:hover { background: #4752c4; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4); }

        /* MAIN CONTENT */
        .content { margin-left: 330px; padding: 50px 40px; width: calc(100% - 370px); animation: fadeIn 1s ease; }

        /* TAB ANIMATIONS */
        .tabs { 
            display: flex; gap: 15px; margin-bottom: 35px; flex-wrap: wrap; 
            background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid var(--border); 
        }
        .tab-btn { 
            background: #0a0a0c; border: 2px solid #222; padding: 12px; border-radius: 14px; 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; width: 85px; 
            transition: var(--transition);
        }
        .tab-btn img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; transition: var(--transition); }
        .tab-btn span { font-size: 11px; font-weight: 800; color: #666; text-transform: uppercase; }
        
        .tab-btn:hover { border-color: #555; transform: scale(1.05); }
        .tab-btn:hover img { filter: brightness(1.2); }
        .tab-btn.active { border-color: var(--gold); background: #1a1b23; box-shadow: 0 0 20px rgba(255, 180, 0, 0.15); }
        .tab-btn.active span { color: var(--gold); }

        /* TABLE ANIMATIONS */
        .table-wrapper { 
            background: var(--panel); border-radius: 20px; border: 1px solid var(--border); 
            overflow: hidden; animation: slideUp 0.6s ease-out;
        }
        .leaderboard { width: 100%; border-collapse: collapse; min-width: 800px; }
        .leaderboard th { background: #1c1d25; padding: 20px; text-align: left; color: #555; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        .player-row { border-bottom: 1px solid #1f2029; transition: var(--transition); opacity: 0; animation: fadeInRow 0.5s forwards; }
        .player-row:hover { background: rgba(255,255,255,0.03); transform: scale(1.002); }
        
        /* RANK 1 EFFECT */
        .rank-1 { background: linear-gradient(90deg, rgba(255,180,0,0.08), transparent) !important; border-left: 4px solid var(--gold); }
        .rank-1 .points-pill { box-shadow: 0 0 15px rgba(255, 180, 0, 0.3); }

        /* STICKER STYLING */
        .sticker-list { display: flex; gap: 10px; }
        .sticker { 
            width: 48px; height: 48px; background: #000; border-radius: 50%; 
            border: 2px solid #333; display: flex; align-items: center; justify-content: center; 
            position: relative; overflow: hidden; transition: var(--transition);
        }
        .sticker:hover { transform: translateY(-5px) rotate(5deg); border-color: var(--gold); }
        .sticker img { width: 100%; height: 100%; object-fit: cover; }
        .sticker span { 
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); 
            color: var(--gold); font-size: 10px; text-align: center; font-weight: 900; padding: 2px 0;
        }

        .points-pill { color: var(--gold); font-weight: 900; background: rgba(255,180,0,0.15); padding: 8px 18px; border-radius: 12px; border: 1px solid rgba(255,180,0,0.3); transition: var(--transition); }
        .region-tag { color: #ff4d4d; font-weight: 800; font-size: 12px; }
        .ign-text { font-weight: 800; font-size: 16px; margin-bottom: 2px; letter-spacing: 0.5px; }
        .role-text { font-size: 11px; color: #555; text-transform: uppercase; font-weight: 700; }

        /* KEYFRAMES */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInRow { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

    </style>
</head>
<body>

<aside class="sidebar">
    <img src="https://i.ibb.co/zWLGpSq0/407408dc39428870d634ec705839589e-1.webp" class="sidebar-logo">
    <a href="https://discord.gg/msDP8m7UBP" target="_blank" class="discord-btn">JOIN DISCORD</a>
</aside>

<main class="content">
    <div class="tabs" id="tabContainer">
        <div class="tab-btn active" onclick="switchTab('overall')"><img src="https://i.ibb.co/YThnm0DD/overall.jpg"><span>Overall</span></div>
        <div class="tab-btn" onclick="switchTab('sword')"><img src="https://i.ibb.co/4q5XZD1/sword.jpg"><span>Sword</span></div>
        <div class="tab-btn" onclick="switchTab('mace')"><img src="https://i.ibb.co/DHYd2KcH/mace.jpg"><span>Mace</span></div>
        <div class="tab-btn" onclick="switchTab('axe')"><img src="https://i.ibb.co/Vc73Q3sV/axe.jpg"><span>Axe</span></div>
        <div class="tab-btn" onclick="switchTab('uhc')"><img src="https://i.ibb.co/7tWt3CvQ/uhc.jpg"><span>UHC</span></div>
        <div class="tab-btn" onclick="switchTab('pot')"><img src="https://i.ibb.co/TqvdKKCg/pot.jpg"><span>Pot</span></div>
        <div class="tab-btn" onclick="switchTab('smp')"><img src="https://i.ibb.co/zhMLjTFK/smp.jpg"><span>SMP</span></div>
        <div class="tab-btn" onclick="switchTab('nethpot')"><img src="https://i.ibb.co/QRjqZ1d/nethpot.jpg"><span>Nethpot</span></div>
        <div class="tab-btn" onclick="switchTab('crystal')"><img src="https://i.ibb.co/Qj6Rzzjn/crystal.jpg"><span>Crystal</span></div>
    </div>

    <div class="table-wrapper">
        <table class="leaderboard">
            <thead>
                <tr>
                    <th style="padding-left: 30px; width: 80px;">Rank</th>
                    <th>Player Profile</th>
                    <th>Region</th>
                    <th>Tiers Earned</th>
                    <th style="text-align: right; padding-right: 30px;">Points</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </div>
</main>

<script>
    const icons = {
        overall: "https://i.ibb.co/YThnm0DD/overall.jpg",
        sword: "https://i.ibb.co/4q5XZD1/sword.jpg", mace: "https://i.ibb.co/DHYd2KcH/mace.jpg",
        axe: "https://i.ibb.co/Vc73Q3sV/axe.jpg", uhc: "https://i.ibb.co/7tWt3CvQ/uhc.jpg",
        pot: "https://i.ibb.co/TqvdKKCg/pot.jpg", smp: "https://i.ibb.co/zhMLjTFK/smp.jpg",
        nethpot: "https://i.ibb.co/QRjqZ1d/nethpot.jpg", crystal: "https://i.ibb.co/Qj6Rzzjn/crystal.jpg"
    };

    const pointValues = { 
        "HT1": 25, "LT1": 20, "HT2": 16, "LT2": 13, "HT3": 10, 
        "LT3": 6, "HT4": 4, "LT4": 2, "HT5": 1, "LT5": 1 
    };

    const players = [
        { ign: "Legend_008", region: "AS", role: "OWNER", tiers: { sword: "HT4", mace: "LT3", crystal: "HT5" } },
        { ign: "tgbeast_2", region: "AS/AU", role: "FIGHTER", tiers: { smp: "LT3" } },
        { ign: "XtremeGamerOP_", region: "AS/AU", role: "FIGHTER", tiers: { sword: "LT3" } },
        { ign: "Crotoov", region: "AS/AU", role: "FIGHTER", tiers: { sword: "LT3" } },
        { ign: "Not_Rohit_yt", region: "AS/AU", role: "FIGHTER", tiers: { sword: "LT3" } },
        { ign: "TECHTYAGI_", region: "AS/AU", role: "FIGHTER", tiers: { sword: "LT3" } },
        { ign: "_realmiss", region: "EU", role: "FIGHTER", tiers: { sword: "LT3" } },
        { ign: "Elden_Boss", region: "AS", role: "APPRENTICE", tiers: { nethpot: "LT4", mace: "LT4", crystal: "HT5" } },
        { ign: "Zenkai_Slice", region: "AS", role: "FIGHTER", tiers: { mace: "HT4" } },
        { ign: "Captain_levi", region: "AS", role: "APPRENTICE", tiers: { axe: "HT4" } },
        { ign: "Vlaan58996", region: "AS", role: "APPRENTICE", tiers: { nethpot: "HT5", mace: "LT4" } }
    ];

    let currentMode = 'overall';

    function render() {
        const body = document.getElementById('leaderboardBody');
        body.innerHTML = "";
        
        let list = players.map(p => {
            let score = 0;
            if (currentMode === 'overall') {
                Object.values(p.tiers).forEach(t => score += (pointValues[t] || 0));
            } else {
                score = pointValues[p.tiers[currentMode]] || 0;
            }
            return { ...p, score };
        })
        .filter(p => currentMode === 'overall' || p.tiers[currentMode])
        .sort((a, b) => b.score - a.score);

        list.forEach((p, i) => {
            const row = document.createElement('tr');
            row.className = `player-row ${i === 0 ? 'rank-1' : ''}`;
            row.style.animationDelay = `${i * 0.05}s`;
            
            const stickersHtml = currentMode === 'overall' 
                ? Object.entries(p.tiers).map(([m, t]) => `<div class="sticker"><img src="${icons[m]}"><span>${t}</span></div>`).join('')
                : `<div class="sticker"><img src="${icons[currentMode]}"><span>${p.tiers[currentMode]}</span></div>`;

            row.innerHTML = `
                <td style="padding-left:30px; font-weight:900; color: ${i === 0 ? 'var(--gold)' : '#444'};">#${i + 1}</td>
                <td style="display:flex; align-items:center; gap:15px; padding:18px;">
                    <img src="https://mc-heads.net/avatar/${p.ign}/42" style="border-radius:6px; border: 1px solid #333;">
                    <div>
                        <div class="ign-text">${p.ign}</div>
                        <div class="role-text">${p.role}</div>
                    </div>
                </td>
                <td><span class="region-tag">${p.region}</span></td>
                <td><div class="sticker-list">${stickersHtml}</div></td>
                <td style="text-align: right; padding-right: 30px;"><span class="points-pill">${p.score} PTS</span></td>
            `;
            body.appendChild(row);
        });
    }

    function switchTab(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab-btn').forEach(b => {
            const txt = b.querySelector('span').innerText.toLowerCase();
            b.classList.toggle('active', txt === mode.toLowerCase());
        });
        render();
    }
    window.onload = render;
</script>
</body>
</html>
