<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arise Network | Official Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        :root {
            --bg: #050505;
            --panel: #0d0e12;
            --border: #1f2026;
            --gold: #ffb400;
            --gold-glow: rgba(255, 180, 0, 0.2);
            --text-dim: #929292;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* Navigation */
        .header-nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 90px;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .nav-container { display: flex; gap: 30px; }
        .nav-item {
            color: var(--text-dim);
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            padding: 12px 18px;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .nav-item.active { color: var(--gold); border-bottom: 2px solid var(--gold); }

        /* Main Layout */
        .container { padding: 140px 5% 60px; max-width: 1400px; margin: 0 auto; }

        /* Typography */
        h1 { font-size: clamp(40px, 8vw, 90px); font-weight: 900; letter-spacing: -4px; margin: 0; text-align: center; }
        .sub-header { color: var(--text-dim); text-align: center; margin-bottom: 60px; font-weight: 500; }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (min-width: 768px) {
            .controls { flex-direction: row; justify-content: space-between; align-items: center; }
        }

        .filter-group { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .filter-btn {
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            white-space: nowrap;
            transition: 0.2s;
        }
        .filter-btn.active { background: #1c1d23; border-color: var(--gold); color: #fff; box-shadow: 0 0 15px var(--gold-glow); }

        .search-input {
            background: var(--panel);
            border: 1px solid var(--border);
            color: #fff;
            padding: 14px 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 300px;
            outline: none;
            transition: 0.3s;
        }
        .search-input:focus { border-color: var(--gold); }

        /* Table Styling */
        .rank-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            transition: 0.3s;
        }
        .rank-card:hover { border-color: rgba(255,180,0,0.4); transform: translateX(5px); }

        .player-info { display: flex; align-items: center; gap: 20px; }
        .rank-num {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1f2026;
            border-radius: 10px;
            font-weight: 900;
            font-size: 18px;
        }
        .rank-1 { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold-glow); }

        .avatar { width: 48px; height: 48px; border-radius: 10px; background: #000; }
        .ign { font-weight: 800; font-size: 18px; }
        .region { color: var(--text-dim); font-size: 12px; font-weight: 600; margin-left: 10px; }

        .stats-group { display: flex; align-items: center; gap: 40px; }
        .points-box { text-align: right; }
        .points-val { color: var(--gold); font-weight: 900; font-size: 22px; }
        .points-label { font-size: 10px; color: var(--text-dim); font-weight: 900; text-transform: uppercase; }

        .tier-tags { display: flex; gap: 8px; }
        .tag {
            background: #000;
            border: 1px solid #222;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            color: var(--gold);
        }

        /* Loading State */
        #loader { text-align: center; padding: 50px; color: var(--gold); font-weight: 800; }
    </style>
</head>
<body>

<nav class="header-nav">
    <div class="nav-container">
        <div class="nav-item active">Leaderboard</div>
        <div class="nav-item">Testers</div>
        <div class="nav-item">Rules</div>
    </div>
</nav>

<div class="container">
    <section>
        <h1>ARISE <span style="color:var(--gold)">NETWORK</span></h1>
        <p class="sub-header">Asia's Premier Combat Analytics & Tiering System</p>
    </section>

    <div class="controls">
        <div class="filter-group" id="kitFilters">
            <button class="filter-btn active" onclick="setFilter('all')">Overall</button>
            <button class="filter-btn" onclick="setFilter('Crystal')">Crystal</button>
            <button class="filter-btn" onclick="setFilter('Mace')">Mace</button>
            <button class="filter-btn" onclick="setFilter('Sword')">Sword</button>
            <button class="filter-btn" onclick="setFilter('Nethpot')">Nethpot</button>
        </div>
        <input type="text" class="search-input" id="search" placeholder="Find player..." onkeyup="renderPlayers()">
    </div>

    <div id="loader">Syncing with Arise Database...</div>
    <div id="playerList"></div>
</div>

<script>
    // --- DATABASE CONFIGURATION ---
    const SUPABASE_URL = 'https://jhipshrdvmctznnqqpjw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_FDXMOLse1zW8FL7Uv3JA_w_27S_ibXp';
    const _db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allPlayers = [];
    let currentFilter = 'all';

    // Fetch data from your 'players' table
    async function init() {
        try {
            const { data, error } = await _db
                .from('players')
                .select('*')
                .order('total_points', { ascending: false });

            if (error) throw error;
            allPlayers = data || [];
            document.getElementById('loader').style.display = 'none';
            renderPlayers();
        } catch (err) {
            document.getElementById('loader').innerHTML = "Failed to load data. Check console.";
            console.error(err);
        }
    }

    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.toLowerCase() === f.toLowerCase() || (f === 'all' && btn.innerText === 'Overall'));
        });
        renderPlayers();
    }

    function renderPlayers() {
        const searchTerm = document.getElementById('search').value.toLowerCase();
        const container = document.getElementById('playerList');
        
        let filtered = allPlayers.filter(p => p.ign.toLowerCase().includes(searchTerm));
        
        if (currentFilter !== 'all') {
            filtered = filtered.filter(p => p.tiers && p.tiers[currentFilter]);
            // Re-sort based on specific kit tier if a filter is active
            // (Optional: can be added if you want kit-specific ranking)
        }

        container.innerHTML = filtered.map((p, i) => `
            <div class="rank-card">
                <div class="player-info">
                    <div class="rank-num ${i === 0 ? 'rank-1' : ''}">${i + 1}</div>
                    <img src="https://mc-heads.net/avatar/${p.ign}/48" class="avatar" alt="">
                    <div>
                        <span class="ign">${p.ign}</span>
                        <span class="region">${p.reg || 'AS'}</span>
                    </div>
                </div>

                <div class="stats-group">
                    <div class="hidden-mobile tier-tags">
                        ${Object.entries(p.tiers || {})
                            .filter(([kit]) => currentFilter === 'all' || kit === currentFilter)
                            .map(([kit, tier]) => `<div class="tag">${kit}: ${tier}</div>`).join('')}
                    </div>
                    <div class="points-box">
                        <div class="points-label">Total Rating</div>
                        <div class="points-val">${p.total_points}</div>
                    </div>
                </div>
            </div>
        `).join('');

        if (filtered.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-dim);">No players found.</p>`;
        }
    }

    window.onload = init;
</script>

</body>
</html>
