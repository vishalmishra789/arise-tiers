<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arise | Admin Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --panel: #0d0e12; --gold: #ffb400; --border: #1f2026; --text-dim: #929292; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; padding: 40px; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 15px; max-width: 500px; margin: 0 auto 20px; }
        h2 { margin-top: 0; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; margin-top: 15px; font-weight: 800; text-transform: uppercase; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #16171d; color: #fff; font-size: 14px; }
        button { background: var(--gold); color: #000; font-weight: 900; cursor: pointer; border: none; margin-top: 20px; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        .hidden { display: none; }
        .logout-btn { background: transparent; color: #ff4747; border: 1px solid #333; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-zone" class="card">
        <h2>Admin Access</h2>
        <label>Username</label>
        <input type="text" id="adminID" placeholder="Username">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="handleLogin()">ENTER PANEL</button>
    </div>

    <div id="admin-zone" class="hidden">
        <div class="card">
            <h2>Player Update</h2>
            
            <label>In-Game Name</label>
            <input type="text" id="p_ign" placeholder="Minecraft IGN">
            
            <label>Region</label>
            <select id="p_region">
                <option value="AS">Asia (AS)</option>
                <option value="EU">Europe (EU)</option>
                <option value="NA">North America (NA)</option>
            </select>
            
            <label>Category</label>
            <select id="p_kit">
                <option value="Crystal">Crystal</option>
                <option value="Mace">Mace</option>
                <option value="Sword">Sword</option>
                <option value="Axe">Axe</option>
                <option value="Nethpot">Nethpot</option>
                <option value="SMP">SMP</option>
                <option value="Potion">Potion</option>
                <option value="UHC">UHC</option>
            </select>
            
            <label>Assigned Tier</label>
            <select id="p_tier">
                <option value="HT1">HT1 (40 pts)</option>
                <option value="LT1">LT1 (32 pts)</option>
                <option value="HT2">HT2 (24 pts)</option>
                <option value="LT2">LT2 (20 pts)</option>
                <option value="HT3">HT3 (16 pts)</option>
                <option value="LT3">LT3 (12 pts)</option>
                <option value="HT4">HT4 (8 pts)</option>
                <option value="LT4">LT4 (4 pts)</option>
                <option value="HT5">HT5 (2 pts)</option>
                <option value="LT5">LT5 (1 pts)</option>
            </select>
            
            <button onclick="publishData()">PUBLISH CHANGES</button>
            <button class="logout-btn" onclick="handleLogout()">LOGOUT</button>
        </div>
    </div>

<script>
    const SB_URL = "https://zsdtlcyzhcfgcwqucdjd.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZHRsY3l6aGNmZ2N3cXVjZGpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDY2MDYsImV4cCI6MjA5MDEyMjYwNn0.IgjMXn3NbVw5nt8CvrJksD4NTEr26nLGwdytUgWFLe0";
    
    // RENAMED to adminClient to fix the SyntaxError
    const adminClient = supabase.createClient(SB_URL, SB_KEY);

    const pointsMap = { "HT1": 40, "LT1": 32, "HT2": 24, "LT2": 20, "HT3": 16, "LT3": 12, "HT4": 8, "LT4": 4, "HT5": 2, "LT5": 1 };

    function handleLogin() {
        const user = document.getElementById('adminID').value;
        const pass = document.getElementById('adminPass').value;
        if (user === "Legend_008" && pass === "VISHAL@2008") {
            localStorage.setItem("arise_admin_auth", "true");
            showPanel();
        } else {
            alert("Login Failed.");
        }
    }

    function showPanel() {
        document.getElementById('login-zone').classList.add('hidden');
        document.getElementById('admin-zone').classList.remove('hidden');
    }

    function handleLogout() {
        localStorage.removeItem("arise_admin_auth");
        location.reload();
    }

    async function publishData() {
        const ign = document.getElementById('p_ign').value.trim();
        const kit = document.getElementById('p_kit').value;
        const tier = document.getElementById('p_tier').value;
        const region = document.getElementById('p_region').value;

        if(!ign) return alert("Enter IGN");

        // Use adminClient here
        const { data: existing } = await adminClient.from('players').select('tiers').eq('ign', ign).maybeSingle();
        
        const updatedTiers = existing ? { ...existing.tiers, [kit]: tier } : { [kit]: tier };
        const totalPoints = Object.values(updatedTiers).reduce((sum, t) => sum + (pointsMap[t] || 0), 0);

        const { error } = await adminClient.from('players').upsert({
            ign: ign, 
            region: region, 
            tiers: updatedTiers, 
            points: totalPoints
        }, { onConflict: 'ign' });

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert(`Updated ${ign} successfully!`);
            document.getElementById('p_ign').value = ""; 
        }
    }

    if (localStorage.getItem("arise_admin_auth") === "true") showPanel();
</script>
</body>
</html>
